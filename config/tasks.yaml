# ============================================================
# Task Definitions — What each agent does, with output schemas
# ============================================================

research_prospects:
  description: >
    Research {company} to find 3-5 people working in or near {role} roles.
    For each person, gather:
    - Full name and current title
    - LinkedIn profile URL
    - 2-3 specific personalization hooks (recent talks, blog posts, open-source
      contributions, social media activity, or career milestones)
    - Brief research notes with any additional context

    Use DuckDuckGo to search with queries like:
    - site:linkedin.com/in/ "{company}" "{role}"
    - "{person name}" blog OR talk OR github OR conference

    Focus on people who would realistically engage with a cold email from an
    intern candidate: senior engineers, engineering managers, developer advocates,
    and recent hires. Skip C-suite and HR.

    If a company's notes mention specific teams or interests, prioritize people
    on those teams.

    Company context: {company_notes}
  expected_output: >
    A structured JSON list of 3-5 prospects, each with: name, title, company,
    linkedin_url, personalization_hooks (at least 1 per person), and research_notes.
    Every prospect MUST have at least one specific personalization hook that goes
    beyond just their job title.
  agent: researcher

find_emails:
  description: >
    For each prospect in the research results, find their professional email address.

    Strategy:
    1. Use the Apollo.io People Search tool with their name and company domain ({company_domain}).
    2. If Apollo doesn't return an email, try Hunter.io Email Finder with their
       first name, last name, and company domain.
    3. Record the email source and confidence score.
    4. If no email is found for a prospect, exclude them from the output — do NOT
       guess or fabricate email addresses.

    Input prospects:
    {research_results}
  expected_output: >
    A structured JSON list of enriched prospects (only those with verified emails).
    Each entry includes all original research data plus: email, email_confidence
    (0-100), and email_source ('apollo' or 'hunter').
  agent: email_finder

draft_emails:
  description: >
    Write a personalized cold email for each enriched prospect.

    For each person, use:
    - Their personalization hooks and research notes (from the research phase)
    - The applicant's profile (from your knowledge base)
    - The company context: {company_notes}

    Each email must:
    - Reference something SPECIFIC about the recipient (from their hooks)
    - Be under 120 words in the body
    - Have a specific, non-generic subject line
    - End with a soft ask (15-min chat, not a job request)
    - Include a CAN-SPAM footer with the applicant's real name, university, links,
      and an opt-out line (use the template from your knowledge)

    Also provide a personalization_note for each draft explaining which hook you
    chose and why — this helps the human reviewer.

    Enriched prospects:
    {enriched_results}
  expected_output: >
    A structured JSON list of email drafts. Each entry includes: to_name, to_email,
    company, subject, body (under 150 words with CAN-SPAM footer), and
    personalization_note (internal reasoning).
  agent: writer
